<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Travel Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-box { border-left: 4px solid #6366f1; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-6">
        <a href="index.html" class="text-indigo-400 font-bold flex items-center gap-2">← Back to Search</a>

        <!-- Main Identity -->
        <div class="glass rounded-[2rem] overflow-hidden">
            <img id="resImg" class="w-full h-60 object-cover" src="">
            <div class="p-6">
                <h1 id="mainTitle" class="text-3xl font-extrabold mb-2">Analyzing...</h1>
                <p id="historyInfo" class="text-gray-400 text-sm leading-relaxed italic">Connecting to internet for historical facts...</p>
            </div>
        </div>

        <!-- Smart Recommendation: What to Wear -->
        <div class="glass p-6 rounded-[2rem]">
            <h2 class="text-lg font-black text-indigo-400 mb-3 flex items-center gap-2">👕 WHAT TO WEAR</h2>
            <p id="clothingAdvice" class="text-sm text-gray-300 bg-white/5 p-4 rounded-xl"></p>
        </div>

        <!-- Recommendations: Places to Visit -->
        <div class="space-y-4">
            <h2 class="text-lg font-black text-purple-400 px-2">📍 TOP PLACES TO VISIT HERE</h2>
            <div id="placeList" class="space-y-3">
                <!-- Recommendations will be injected here -->
            </div>
        </div>
    </div>

    <script>
        window.onload = async function() {
            const data = JSON.parse(localStorage.getItem('tripData'));
            if(!data) return;

            document.getElementById('resImg').src = data.photo || "https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=800&q=80";
            
            // Logic: Search for State info first, then GPS, then Country
            const query = data.state || data.gps || data.country;
            document.getElementById('mainTitle').innerText = query;

            // 1. Fetch History from Wikipedia API
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const wiki = await res.json();
                document.getElementById('historyInfo').innerText = wiki.extract || "A region rich in culture and geographical diversity.";
            } catch (e) { document.getElementById('historyInfo').innerText = "Historical significance details are available in local archives."; }

            // 2. Clothing Advice Logic
            const wear = {
                Cold: "Pack heavy woolens, thermal inner-wear, waterproof boots, and gloves. Layering is key to surviving the low temperatures.",
                Tropical: "Lightweight cotton or linen clothes. Don't forget swimwear, sunglasses, a wide-brimmed hat, and high-SPF sunscreen.",
                Moderate: "Casual layers like t-shirts with a light jacket or hoodie. Comfortable sneakers are a must for exploring.",
                Desert: "Breathable, loose-fitting clothes that cover your skin. A scarf to protect from sand/sun and sturdy sandals."
            };
            document.getElementById('clothingAdvice').innerText = wear[data.climate];

            // 3. Specific Place Recommendations Logic
            // In a real app, this would hit a Google Places API. 
            // For this two-file version, we use a smart generator based on "Interest".
            const recs = {
                Historical: [
                    { name: "Old Quarter Museum", desc: "Showcases centuries of local architecture and artifacts." },
                    { name: "Central Heritage Plaza", desc: "A famous landmark where major historical events occurred." }
                ],
                Nature: [
                    { name: "Green Valley Trails", desc: "Scenic hiking paths with panoramic views of the region." },
                    { name: "Riverside Eco Park", desc: "Perfect for bird watching and experiencing local flora." }
                ],
                Urban: [
                    { name: "The Grand Skydeck", desc: "The highest point in the city for a modern view." },
                    { name: "Metro Shopping District", desc: "A hub for modern fashion, food, and local crafts." }
                ]
            };

            const list = document.getElementById('placeList');
            const selectedRecs = recs[data.interest];
            list.innerHTML = selectedRecs.map(p => `
                <div class="glass p-5 rounded-2xl accent-box">
                    <h4 class="font-bold text-white">${p.name}</h4>
                    <p class="text-xs text-gray-500 mt-1">${p.desc}</p>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
